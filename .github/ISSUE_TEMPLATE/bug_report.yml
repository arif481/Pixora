name: Bug Report
description: Report a reproducible defect or regression.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe what happened and what you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: List exact steps, inputs, and environment details.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs, Screenshots, or Context
      description: Share any relevant output, screenshots, or request details.
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Explain who is affected and how severe the issue is.
